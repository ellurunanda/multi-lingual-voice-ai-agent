version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: voiceai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceai_password}
      POSTGRES_DB: ${POSTGRES_DB:-voiceai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/models/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceai_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: voiceai_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceai_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voiceai_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://voiceai:voiceai_password@postgres:5432/voiceai_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voiceai_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voiceai_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - voiceai_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  voiceai_network:
    driver: bridge